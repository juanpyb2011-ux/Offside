<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offside | Streetwear</title>

<style>
body{font-family:Arial;margin:0;background:#f5f1e8;color:#000}
header{background:#000;color:#fff;padding:20px;text-align:center;font-size:24px;font-weight:bold;letter-spacing:2px}
.container{padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{background:#fff;padding:15px;border-radius:12px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.card img{width:100%;border-radius:10px}
button{background:#000;color:#fff;border:none;padding:10px;margin-top:10px;cursor:pointer;border-radius:6px;transition:0.3s}
button:hover{background:#c2b59b;color:#000}
.cart{position:fixed;top:20px;right:20px;background:#000;color:#fff;padding:15px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.2)}
h2{color:#000}
</style>
</head>

<body>
<header>OFFSIDE</header>

<div class="cart">
🛒 <span id="cart-count">0</span>
<br>
<button onclick="sendWhatsApp()">Comprar</button>
</div>

<div class="container">
<h2>Productos</h2>

<div class="products" id="products">

<!-- PRODUCTO 1 -->
<div class="card">
<img src="LINK_DE_TU_IMAGEN_AQUI" alt="Producto">
<h3>Sudadera Offside Negra</h3>
<p>$499 MXN</p>
<button onclick="addToCart('Sudadera Offside Negra',499)">Agregar</button>
</div>

<!-- PRODUCTO 2 -->
<div class="card">
<img src="LINK_DE_TU_IMAGEN_AQUI" alt="Producto">
<h3>Playera Offside Blanca</h3>
<p>$299 MXN</p>
<button onclick="addToCart('Playera Offside Blanca',299)">Agregar</button>
</div>

</div>
</div>

<script>
let cart = [];

function addToCart(name, price){
cart.push({name,price});
document.getElementById('cart-count').innerText = cart.length;
}

function sendWhatsApp(){
let message = 'Hola, quiero comprar:%0A';
let total = 0;

cart.forEach(item => {
message += `- ${item.name} ($${item.price})%0A`;
total += item.price;
});

message += `%0ATotal: $${total}`;

window.open(`https://wa.me/52224290839?text=${message}`,'_blank');
}
</script>

</body>
</html>
