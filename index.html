<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offside | Streetwear</title>

<style>
body{font-family:Arial;margin:0;background:#f5f1e8;color:#000}
header{background:#000;color:#fff;padding:15px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000}
.logo{font-size:22px;font-weight:bold;letter-spacing:2px}
.menu-btn{font-size:22px;cursor:pointer;z-index:1300;position:relative;color:#fff}

.sidebar{position:fixed;top:0;left:-250px;width:250px;height:100%;background:#000;color:#fff;padding:20px;transition:0.3s;z-index:1200}
.sidebar a{display:block;color:#fff;text-decoration:none;margin:15px 0;font-size:18px;cursor:pointer}
.sidebar a:hover{color:#c2b59b}

.container{padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{background:#fff;padding:15px;border-radius:12px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);cursor:pointer}
.card img{width:100%;border-radius:10px}
button{background:#000;color:#fff;border:none;padding:10px;margin-top:10px;cursor:pointer;border-radius:6px;transition:0.3s}
button:hover{background:#c2b59b;color:#000}

.cart{position:fixed;bottom:20px;right:20px;background:#000;color:#fff;padding:15px;border-radius:12px}

#product-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:2000}

.modal-box{background:#fff;width:90%;max-width:900px;border-radius:15px;padding:20px;display:flex;gap:20px;flex-wrap:wrap;position:relative;animation:fadeIn 0.3s ease}

@keyframes fadeIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>

<body>

<div class="sidebar" id="menu">
<h3>Menú</h3>
<a onclick="showCategory('all')">Todo</a>
<a onclick="showCategory('sudaderas')">Sudaderas</a>
<a onclick="showCategory('playeras')">Playeras</a>
</div>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="logo">OFFSIDE</div>
</header>

<div class="cart">
🛒 <span id="cart-count">0</span><br>
<button onclick="sendWhatsApp()">Comprar</button>
</div>

<div class="container">
<h2>Productos</h2>
<div class="products">

<!-- PRODUCTO EJEMPLO CORREGIDO -->
<div class="card sudaderas" onclick="openModal('Sudadera Offside Black',499,['https://i.postimg.cc/cLhjyrCh/Gemini-Generated-Image-ods66jods66jods6.png'])">
<img src="https://i.postimg.cc/cLhjyrCh/Gemini-Generated-Image-ods66jods66jods6.png">
<h3>Sudadera Offside Black</h3>
<p>$499 MXN</p>
<button onclick="event.stopPropagation(); addToCart('Sudadera Offside Black',499)">Agregar</button>
</div>

<div class="card playeras">
<img src="https://i.postimg.cc/NfXS2rW3/Gemini-Generated-Image-enenqoenenqoenen.png">
<h3>Basic Offside Blanca</h3>
<p>$299 MXN</p>
<button onclick="event.stopPropagation(); addToCart('Basic Offside Blanca',299)">Agregar</button>
</div>

<div class="card playeras">
<img src="https://i.postimg.cc/tg3jf3Lj/Gemini-Generated-Image-xl9st8xl9st8xl9s.png">
<h3>Fresh Offside Blanca</h3>
<p>$599 MXN</p>
<button onclick="event.stopPropagation(); addToCart('Fresh Offside Blanca',599)">Agregar</button>
</div>

</div>
</div>

<!-- MODAL -->
<div id="product-modal">
<div class="modal-box">
<span onclick="closeModal()" style="position:absolute;top:10px;right:15px;font-size:25px;cursor:pointer">✖</span>

<div style="flex:1">
<img id="main-img" style="width:100%;border-radius:10px">
</div>

<div style="flex:1">
<h2 id="product-name"></h2>
<p id="product-price"></p>

<select id="size">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<button onclick="addFromModal()">Agregar</button>
</div>
</div>
</div>

<script>
let cart=[];
let selectedProduct={};

function toggleMenu(){
let menu=document.getElementById('menu');
menu.style.left=menu.style.left==='0px' ? '-250px':'0px';
}

function showCategory(category){
let products=document.querySelectorAll('.card');
products.forEach(p=>{
if(category==='all') p.style.display='block';
else p.style.display=p.classList.contains(category)?'block':'none';
});
toggleMenu();
}

function addToCart(name,price){
cart.push({name,price});
document.getElementById('cart-count').innerText=cart.length;
alert('Agregado al carrito 🛒');
}

function sendWhatsApp(){
let message='Hola, quiero comprar:%0A';
let total=0;
cart.forEach(item=>{
message+=`- ${item.name} ($${item.price})%0A`;
total+=item.price;
});
message+=`%0ATotal: $${total}`;
window.open(`https://wa.me/52224290839?text=${message}`,'_blank');
}

function openModal(name,price,images){
document.getElementById('product-modal').style.display='flex';
document.getElementById('product-name').innerText=name;
document.getElementById('product-price').innerText=`$${price} MXN`;
document.getElementById('main-img').src=images[0];
selectedProduct={name,price};
}

function closeModal(){
document.getElementById('product-modal').style.display='none';
}

function addFromModal(){
let size=document.getElementById('size').value;
cart.push({name:selectedProduct.name+' - '+size,price:selectedProduct.price});
document.getElementById('cart-count').innerText=cart.length;
closeModal();
}

// cerrar modal tocando fondo
document.getElementById('product-modal').addEventListener('click',function(e){
if(e.target===this) closeModal();
});
</script>

</body>
</html>
